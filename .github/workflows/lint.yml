name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── 1. Biome lint + format check ─────────────────────────────────────────────
  biome:
    name: Biome (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun audit

      - name: Biome check
        run: bunx @biomejs/biome ci --diagnostic-level=error ./src

  # ── 2. TypeScript type check ──────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

  # ── 3. PHP lint (WordPress coding standards) ──────────────────────────────────
  php:
    name: PHP lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress

      - name: Run PHPCS
        run: composer run lint

  # ── 4. Frontend summary — required status check ───────────────────────────────
  # This job exists solely to satisfy the "frontend" required branch protection
  # check. It passes only when both biome and typecheck pass.
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: [biome, typecheck]
    steps:
      - run: echo "All frontend checks passed."